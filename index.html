<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#151923" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow,noarchive" />
    <meta name="description" content="WeightPlay by WeightStudio is a mobile-first AI web game platform for kids, families, and casual players." />
    <meta name="copyright" content="Copyright 2026 WeightStudio. All rights reserved." />
    <title>WeightPlay by WeightStudio</title>
    <link rel="manifest" href="manifest.webmanifest?v=20260629-wonder-audio1" />
    <link rel="stylesheet" href="src/styles.css?v=20260629-wonder-audio1" />
  </head>
  <body class="lobby-page">
    <main class="lobby-shell">
      <header class="lobby-hero">
        <div class="lobby-hero-copy">
          <p id="lobbyKicker" class="lobby-kicker">Kids & Family Games</p>
          <h1 id="platformTitle">WeightPlay</h1>
          <p class="brand-byline">by WeightStudio</p>
          <p id="platformSubtitle" class="lobby-subtitle"></p>
        </div>
        <label class="language-picker">
          <span id="languageLabel">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">繁體中文</option>
          </select>
        </label>
        <a id="featuredGame" class="lobby-feature" href="games/wonder-crash/index.html">
          <img src="assets/hero.png" alt="" />
          <div>
            <span id="featuredLabel">Featured</span>
            <strong>Wonder Crash</strong>
          </div>
        </a>
      </header>

      <section id="lobbyStats" class="lobby-stats" aria-label="Platform status"></section>

      <section class="age-filter" aria-label="Age filters">
        <button class="active" type="button" data-age-filter="all" data-i18n="filter.all_ages">All Ages</button>
        <button type="button" data-age-filter="3">3+</button>
        <button type="button" data-age-filter="5">5+</button>
        <button type="button" data-age-filter="13">13+</button>
        <button type="button" data-age-filter="family" data-i18n="filter.family">Family</button>
      </section>

      <section class="topic-filter" aria-label="Topic filters">
        <button class="active" type="button" data-topic-filter="all" data-i18n="filter.all_topics">All Topics</button>
        <button type="button" data-topic-filter="Featured" data-i18n="topic.featured">Featured</button>
        <button type="button" data-topic-filter="Animal Games" data-i18n="topic.animal">Animal Games</button>
        <button type="button" data-topic-filter="Puzzle" data-i18n="topic.puzzle">Puzzle</button>
        <button type="button" data-topic-filter="Arcade" data-i18n="topic.arcade">Arcade</button>
        <button type="button" data-topic-filter="Education" data-i18n="topic.education">Education</button>
      </section>

      <section id="heroGamesSection" class="hero-games-section" aria-label="Hero Games">
        <div class="section-heading">
          <span id="heroRankLabel">Top 3</span>
          <h2 id="heroGamesTitle">Hero Games</h2>
        </div>
        <div id="heroGames" class="hero-games"></div>
      </section>

      <div id="filterStatus" class="filter-status" aria-live="polite"></div>
      <section id="gameGrid" class="lobby-grid" aria-label="Game list"></section>
    </main>

    <div id="lobbyToast" class="lobby-toast hidden" role="status" aria-live="polite"></div>

    <script src="src/site-config.js?v=20260629-wonder-audio1"></script>
    <script src="src/analytics.js?v=20260629-wonder-audio1"></script>
    <script src="src/sound.js?v=20260629-wonder-audio1"></script>
    <script src="src/i18n.js?v=20260629-wonder-audio1"></script>
    <script src="src/lobby-data.js?v=20260629-wonder-audio1"></script>
    <script src="src/lobby.js?v=20260629-wonder-audio1"></script>
  </body>
</html>
