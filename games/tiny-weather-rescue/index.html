<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#57b9e8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Pick the right rescue tools for rain, heat, thunder, and hungry animals in Tiny Weather Rescue, a gentle family reaction puzzle on WeightPlay." />
    <meta property="og:site_name" content="WeightPlay" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tiny Weather Rescue - Weather Tool Puzzle Game" />
    <meta property="og:description" content="Watch each weather card and choose the right rescue tool for cute animals." />
    <meta property="og:url" content="https://weightstudio.github.io/weightplay/games/tiny-weather-rescue/" />
    <meta property="og:image" content="https://weightstudio.github.io/weightplay/assets/tiny-weather-rescue-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Tiny Weather Rescue - WeightPlay</title>
    <link rel="canonical" href="https://weightstudio.github.io/weightplay/games/tiny-weather-rescue/" />
    <link rel="stylesheet" href="style.css?v=20260630-weather2" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Tiny Weather Rescue",
        "alternateName": "小小天氣救援",
        "url": "https://weightstudio.github.io/weightplay/games/tiny-weather-rescue/",
        "image": "https://weightstudio.github.io/weightplay/assets/tiny-weather-rescue-cover.png",
        "description": "Pick the right rescue tools for rain, heat, thunder, and hungry animals in a gentle family puzzle game.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "publisher": { "@type": "Organization", "name": "WeightStudio" },
        "inLanguage": ["en", "zh-Hant"],
        "isAccessibleForFree": true
      }
    </script>
  </head>
  <body>
    <main class="weather-game">
      <header class="topbar">
        <a class="home-link" href="../../index.html" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 data-ui="gameTitle">Tiny Weather Rescue</h1>
        </div>
        <label class="language-picker">
          <span data-ui="language">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">繁體中文</option>
          </select>
        </label>
      </header>

      <section id="menuPanel" class="menu-panel">
        <img class="cover" src="../../assets/tiny-weather-rescue-cover.png" alt="" />
        <div class="menu-copy">
          <strong data-ui="chooseStage">Choose Rescue</strong>
          <span data-ui="menuHint">Watch the weather and pick the right rescue tool.</span>
        </div>
        <div id="stageGrid" class="stage-grid" aria-label="Stage list"></div>
      </section>

      <section id="playPanel" class="play-panel hidden">
        <div class="play-head">
          <button id="backToStagesBtn" class="soft-btn" type="button" data-ui="stages">Stages</button>
          <div class="stats">
            <span id="stageText">Stage 1</span>
            <span id="movesText">1 / 4</span>
            <span id="starsText">Calm 0</span>
          </div>
        </div>
        <div id="board" class="board" aria-label="Weather rescue board"></div>
        <div id="hintText" class="hint" aria-live="polite"></div>
      </section>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Rescue Complete!</strong>
          <div id="starText" class="stars">☆☆☆</div>
          <span id="resultText"></span>
          <button id="nextStageBtn" type="button" data-ui="nextStage">Next Stage</button>
          <button id="retryBtn" type="button" data-ui="retry">Try Again</button>
          <button id="resultStagesBtn" type="button" data-ui="stages">Stages</button>
          <a href="../../index.html" data-ui="lobby">Lobby</a>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong data-ui="loading">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <script src="../../src/site-config.js?v=20260630-weather2"></script>
    <script src="../../src/version.js?v=20260630-version1"></script>
    <script src="../../src/analytics.js?v=20260630-weather2"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "tiny-weather-rescue" });
    </script>
    <script src="../../src/sound.js?v=20260630-weather2"></script>
    <script src="../../src/i18n.js?v=20260630-weather2"></script>
    <script src="game.js?v=20260630-weather2"></script>
  </body>
</html>
