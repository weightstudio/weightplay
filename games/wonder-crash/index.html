<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12151d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Wonder Crash - WeightPlay</title>
    <base href="../../" />
    <link rel="manifest" href="manifest.webmanifest?v=20260629-wonder-cover1" />
    <link rel="stylesheet" href="src/styles.css?v=20260629-wonder-cover1" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="950" height="1688" aria-label="Wonder Crash game board"></canvas>

      <!-- Battle HUD -->
      <div id="battleHud" class="hud top-right hidden">
        <div><span data-i18n="hud_stage">Stage</span> <span id="levelText">1</span></div>
        <div><span data-i18n="hud_wave">Wave</span> <span id="waveText">1/1</span></div>
        <div class="coin-line"><img src="assets/coin.png" alt="" /> <span id="coinText">0</span></div>
      </div>

      <!-- Settings In-game Toggle Button -->
      <button id="settingsBtn" type="button" class="settings-btn hidden" aria-label="Settings">&#9881;</button>

      <!-- Main Game Overlays / Menus -->
      <div id="overlay" class="overlay">
        <h1 class="hidden" data-i18n="game_title">Wonder Crash</h1>
        <div id="menuCoinLine" class="menu-coin-line"><img src="assets/coin.png" alt="" /> <span id="menuCoinText">0</span></div>
        <p id="overlayText" data-i18n="menu_title">Main Menu</p>
        
        <div id="menuContent" class="menu-content">
          <div id="profilePanel" class="profile-panel"></div>
          <div id="levelGrid" class="level-grid"></div>
        </div>
        
        <div id="upgradeGrid" class="upgrade-grid hidden"></div>
        
        <!-- Pause / Settings Panel -->
        <div id="pausePanel" class="pause-panel hidden">
          <button id="resumeBtn" type="button" data-i18n="btn_resume">Resume</button>
          <button id="leaveBtn" type="button" data-i18n="btn_leave">Leave Battle</button>
        </div>
        
        <button id="startBtn" type="button" class="hidden" data-i18n="btn_start">Start</button>
        
        <!-- Navigation Menu Tabs -->
        <nav id="menuTabs" class="menu-tabs">
          <button type="button" data-menu-tab="character"><img src="assets/menu-character.png" alt="" /><span data-i18n="tab_character">Hero</span></button>
          <button type="button" data-menu-tab="equipment"><img src="assets/menu-equipment.png" alt="" /><span data-i18n="tab_equipment">Weapons</span></button>
          <button type="button" data-menu-tab="battle"><img src="assets/menu-battle.png" alt="" /><span data-i18n="tab_battle">Stages</span></button>
          <button type="button" data-menu-tab="wall"><img src="assets/menu-wall.png" alt="" /><span data-i18n="tab_wall">Wall</span></button>
          <button type="button" data-menu-tab="settings"><img src="assets/menu-settings.png" alt="" /><span data-i18n="tab_settings">Settings</span></button>
        </nav>
      </div>

      <!-- Weapon Details Modal Dialog -->
      <div id="weaponModal" class="weapon-modal hidden" role="dialog" aria-modal="true">
        <div class="weapon-modal-card">
          <button id="weaponModalClose" class="weapon-modal-close" type="button" aria-label="Close">&times;</button>
          <div id="weaponModalContent"></div>
        </div>
      </div>
    </main>

    <!-- Platform Modules and Script Loaders -->
    <script src="src/site-config.js?v=20260629-wonder-cover1"></script>
    <script src="src/analytics.js?v=20260629-wonder-cover1"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "wonder-crash" });
    </script>
    <script src="src/sound.js?v=20260629-wonder-cover1"></script>
    <script src="src/i18n.js?v=20260629-wonder-cover1"></script>
    <script src="src/game-data.js?v=20260629-wonder-cover1"></script>
    <script src="src/game.js?v=20260629-wonder-cover1"></script>
  </body>
</html>
