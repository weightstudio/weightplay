<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#55a96d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Help cute zoo animals with food, water, cleaning, and play tasks in Zoo Helper Day, a family-friendly animal care game on WeightPlay." />
    <meta property="og:site_name" content="WeightPlay" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zoo Helper Day - Animal Care Game" />
    <meta property="og:description" content="Help cute zoo animals with food, water, cleaning, and play tasks in Zoo Helper Day, a family-friendly animal care game on WeightPlay." />
    <meta property="og:url" content="https://weightstudio.github.io/weightplay/games/zoo-helper-day/" />
    <meta property="og:image" content="https://weightstudio.github.io/weightplay/assets/zoo-helper-day-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zoo Helper Day - WeightPlay" />
    <meta name="twitter:description" content="Help cute zoo animals with gentle care tasks." />
    <meta name="twitter:image" content="https://weightstudio.github.io/weightplay/assets/zoo-helper-day-cover.png" />
    <title>Zoo Helper Day - WeightPlay</title>
    <link rel="canonical" href="https://weightstudio.github.io/weightplay/games/zoo-helper-day/" />
    <link rel="stylesheet" href="style.css?v=20260630-zoo1" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Zoo Helper Day",
        "alternateName": "動物園小幫手",
        "url": "https://weightstudio.github.io/weightplay/games/zoo-helper-day/",
        "image": "https://weightstudio.github.io/weightplay/assets/zoo-helper-day-cover.png",
        "description": "Help cute zoo animals with food, water, cleaning, and play tasks in a gentle stage-based animal care game.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "publisher": { "@type": "Organization", "name": "WeightStudio" },
        "inLanguage": ["en", "zh-Hant"],
        "isAccessibleForFree": true
      }
    </script>
  </head>
  <body>
    <main class="zoo-game">
      <header class="topbar">
        <a class="home-link" href="../../index.html" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 data-ui="gameTitle">Zoo Helper Day</h1>
        </div>
        <label class="language-picker">
          <span data-ui="language">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">繁體中文</option>
          </select>
        </label>
      </header>

      <section id="menuPanel" class="menu-panel">
        <img class="cover" src="../../assets/zoo-helper-day-cover.png" alt="" />
        <div class="menu-copy">
          <strong data-ui="chooseStage">Choose Stage</strong>
          <span data-ui="menuHint">Help animals finish gentle care tasks.</span>
        </div>
        <div id="stageGrid" class="stage-grid" aria-label="Stage list"></div>
      </section>

      <section id="playPanel" class="play-panel hidden">
        <div class="play-head">
          <button id="backToStagesBtn" class="soft-btn" type="button" data-ui="stages">Stages</button>
          <div class="progress-line">
            <span id="stageText">Stage 1</span>
            <div><i id="progressFill"></i></div>
          </div>
        </div>
        <div id="animalCard" class="animal-card">
          <div id="animalEmoji" class="animal-emoji" aria-hidden="true">🦁</div>
          <strong id="animalName">Lion</strong>
          <span id="requestText">Needs food</span>
        </div>
        <div id="itemGrid" class="item-grid" aria-label="Care items"></div>
        <div id="feedbackText" class="feedback" aria-live="polite"></div>
      </section>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Great job!</strong>
          <div id="starText" class="stars">★★★</div>
          <span id="resultText"></span>
          <button id="nextStageBtn" type="button" data-ui="nextStage">Next Stage</button>
          <button id="retryBtn" type="button" data-ui="retry">Try Again</button>
          <button id="resultStagesBtn" type="button" data-ui="stages">Stages</button>
          <a href="../../index.html" data-ui="lobby">Lobby</a>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong data-ui="loading">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <script src="../../src/site-config.js?v=20260630-zoo1"></script>
    <script src="../../src/version.js?v=20260630-version1"></script>
    <script src="../../src/analytics.js?v=20260630-zoo1"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "zoo-helper-day" });
    </script>
    <script src="../../src/sound.js?v=20260630-zoo1"></script>
    <script src="../../src/i18n.js?v=20260630-zoo1"></script>
    <script src="game.js?v=20260630-zoo1"></script>
  </body>
</html>
